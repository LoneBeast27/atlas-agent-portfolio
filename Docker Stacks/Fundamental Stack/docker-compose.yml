x-common-keys: &common-keys
  restart: unless-stopped
  logging:
    driver: json-file
  env_file: '.env'

services:
  nginx-proxy-manager:
    <<: *common-keys
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy-manager
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - '${SPEED_DRIVE}/npm/data:/data'
      - '${SPEED_DRIVE}/npm/letsencrypt:/etc/letsencrypt'
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:81/ || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - web_proxy
      - default

  mongo:
    <<: *common-keys
    image: 'mongo:latest'
    container_name: komodo-mongo
    volumes:
      - '${SPEED_DRIVE}/komodo/mongo:/data/db'
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G

  komodo-core:
    <<: *common-keys
    image: 'ghcr.io/moghtech/komodo-core:latest'
    container_name: komodo-core

    environment:
      - KOMODO_DATABASE_ADDRESS=mongo:27017
      - KOMODO_PASSKEY=${KOMODO_PASSKEY}
      - KOMODO_FIRST_SERVER=http://komodo-periphery:8120
      - KOMODO_CONFIG_FILE=/config/core.config.toml
      # Explicit overrides
      - KOMODO_DISABLE_USER_REGISTRATION=false
      - KOMODO_EXTERNAL_URL=https://dash.lonebeast.net
    depends_on:
      - mongo
    volumes:
      - '${SPEED_DRIVE}/komodo/core:/config'
      - './core.config.toml:/config/core.config.toml'
    networks:
      - web_proxy
      - default

  komodo-periphery:
    <<: *common-keys
    image: 'ghcr.io/moghtech/komodo-periphery:latest'
    container_name: komodo-periphery
    environment:
      - PERIPHERY_PASSKEYS=${KOMODO_PASSKEY}
      - PERIPHERY_SSL_ENABLED=false
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock'

  cloudflare-ddns:
    <<: *common-keys
    image: oznu/cloudflare-ddns:latest
    container_name: cloudflare-ddns
    environment:
      - API_KEY=${CLOUDFLARE_API_TOKEN}
      - ZONE=lonebeast.net
      - PROXIED=true
    networks:
      - default

networks:
  web_proxy:
    external: true
